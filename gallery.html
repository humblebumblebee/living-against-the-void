<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Against the Void: the paintings</title>
<meta name="description" content="Original paintings from Living Against the Void, a book on existential grief and the grief of being. To live against the void is to accept the meaningless, and create meaning.">
<style>
  :root{ --ink:#e9e6df; --muted:#9b958a; --bg:#0c0c0e; --accent:#c9a25f; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:Georgia,'Times New Roman',serif;
        line-height:1.6; text-align:center; }
  .wrap{ max-width:1100px; margin:0 auto; padding:48px 24px 72px; }
  h1{ font-size:clamp(1.8rem,5vw,2.8rem); font-weight:400; }
  p.tag{ margin-top:16px; font-style:italic; color:#d8d2c6; font-size:clamp(1rem,2.4vw,1.25rem); }
  .cta{ display:inline-block; margin-top:28px; padding:14px 32px; background:var(--accent);
        color:#0c0c0e; text-decoration:none; border:1px solid var(--accent); border-radius:2px;
        font-size:1.05rem; }
  .grid{ margin-top:48px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
         gap:18px; }
  .grid img{ width:100%; border-radius:3px; display:block; }
  footer{ margin-top:56px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Living Against the Void</h1>
    <p class="tag">"To live against the void is to accept the meaningless, and create meaning."</p>
    <a class="cta" href="https://a.co/d/08uRkCuF">Get the book on Amazon</a>

    <div class="grid">
      <img src="pins/Web.jpg" alt="Web, a face veiled in white threads. Painting from Living Against the Void.">
      <img src="pins/Nothingness.jpg" alt="Nothingness, standing at the edge of the void. Painting from Living Against the Void.">
      <img src="pins/Blackhole.jpg" alt="Blackhole, what pulls at us when meaning gives way. Painting from Living Against the Void.">
      <img src="pins/Torment.jpg" alt="Torment, the slow weight of existential grief. Painting from Living Against the Void.">
      <img src="pins/Prism.jpg" alt="Prism, fractured light and fractured meaning. Painting from Living Against the Void.">
      <img src="pins/Cell.jpg" alt="Cell, the solitude of a mind turned inward. Painting from Living Against the Void.">
      <img src="pins/Turmoil.jpg" alt="Turmoil, before acceptance comes the storm. Painting from Living Against the Void.">
      <img src="pins/Unnoticed.jpg" alt="Unnoticed, to feel unseen in a vast indifferent world. Painting from Living Against the Void.">
    </div>

    <footer>
      <a class="cta" href="https://a.co/d/08uRkCuF">Get the book on Amazon</a>
    </footer>
  </div>
